name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check src/ tests/

      - name: Check linting
        run: ruff check src/ tests/

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    # Job-level env: applied to every step, including pytest collection.
    # Modules read these at import time, so they must be present before
    # any step that triggers a Python import (install, unit tests, integration).
    env:
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_SECURITY_TOKEN: testing
      AWS_SESSION_TOKEN: testing
      DYNAMODB_TABLE: test-idempotency
      ARCHIVE_BUCKET: test-bucket
      DOWNSTREAM_EVENT_BUS_ARN: arn:aws:events:us-east-1:123456789012:event-bus/test-downstream

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Unit tests
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          ARCHIVE_BUCKET: test-archive-bucket
          DYNAMODB_TABLE: test-idempotency-table
          EVENT_BUS_NAME: test-event-bus

        run: |
          pytest tests/unit -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Integration tests
        run: |
          pytest tests/integration -v \
            --cov=src \
            --cov-append \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=85

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
